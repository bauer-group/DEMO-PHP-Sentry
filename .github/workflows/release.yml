name: 🚀 Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      force-release:
        description: 'force create release'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ⚠️ Compose Validation auskommentiert - kein docker-compose.yml vorhanden
  # validate-compose:
  #   uses: bauer-group/automation-templates/.github/workflows/modules-validate-compose.yml@main
  #   with:
  #     compose-file: 'docker-compose.yml'
  #     env-template: |
  #       {
  #         "APP_ID": "test",
  #         "APP_KEY": "base64:test",
  #         "DB_PASSWORD": "test",
  #         "REDIS_PASSWORD": "test"
  #       }

  # ⚠️ Script Validation auskommentiert - keine Shell-Scripts vorhanden
  # validate-scripts:
  #   uses: bauer-group/automation-templates/.github/workflows/modules-validate-shellscript.yml@main
  #   with:
  #     scan-directory: '.'
  #     severity: 'warning'

  release:
    # needs: [validate-compose, validate-scripts]  # Kommentiert - Validierungen deaktiviert
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: bauer-group/automation-templates/.github/workflows/modules-semantic-release.yml@main
    with:
      target-branch: 'main'
      dry-run: false
      force-release: ${{ inputs.force-release || false }}
    secrets: inherit
